services:
  - type: web
    name: ai-dine-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        fromValue: production
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: STORAGE_BUCKET
        sync: false
